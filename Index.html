<script>
// Auto-detect Flask URL
const FLASK_URL = "https://https://zomato-eta-predictor.onrender.com/predict";
async function predict() {

  const inputs = {
    weather: document.getElementById('weather').value,
    traffic: document.getElementById('traffic').value,
    vehicle: document.getElementById('vehicle').value,
    city: document.getElementById('city').value,
    region: document.getElementById('region').value,
    order_type: document.getElementById('order_type').value,
    multi: document.getElementById('multi').value,
    age: document.getElementById('age').value,
    rating: document.getElementById('rating').value,
    distance: document.getElementById('distance').value,
    hour: document.getElementById('hour').value,
    vehicle_cond: document.getElementById('vehicle_cond').value,
    festival: document.getElementById('festival').value,
  };

  const btn = document.getElementById('predictBtn');
  const errBanner = document.getElementById('errBanner');

  btn.textContent = '⏳ Calculating...';
  btn.classList.add('loading');

  errBanner.style.display = 'none';

  try {

    const response = await fetch(FLASK_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(inputs)
    });

    if (!response.ok) {
      throw new Error(`Server Error: ${response.status}`);
    }

    const result = await response.json();

    renderResults(
      Math.round(result.eta),
      inputs,
      result.low,
      result.high,
      result.region_delta
    );

  } catch (err) {

    errBanner.style.display = 'flex';

    errBanner.querySelector('.err-msg').textContent =
      err.message.includes('Failed to fetch')
        ? `Cannot connect to Flask server.`
        : err.message;

  }

  btn.textContent = '⚡ Predict Delivery Time';
  btn.classList.remove('loading');
}

function renderResults(eta, inputs, apiLow, apiHigh, regionDelta) {

  const mae = 4.21;

  const low = apiLow ?? Math.max(10, Math.round(eta - mae));
  const high = apiHigh ?? Math.min(54, Math.round(eta + mae));

  const fullRange = 54 - 10;
  const predRange = Math.max(1, high - low);

  const confidence = Math.max(
    30,
    Math.min(
      98,
      Math.round((1 - predRange / fullRange) * 100 + 50)
    )
  );

  let tier;

  if (eta <= 18) tier = 'Express';
  else if (eta <= 24) tier = 'Fast';
  else if (eta <= 33) tier = 'Standard';
  else tier = 'Slow';

  // FIXED REGION LABEL
  const regionLabel = {
    North: 'North India',
    South: 'South India'
  }[inputs.region];

  const regionEmoji = {
    North: '🧭',
    South: '🌴'
  }[inputs.region];

  // RESULT CARDS
  document.getElementById('etaVal').textContent = eta;

  document.getElementById('rangeVal').textContent =
    `${low}–${high} min`;

  document.getElementById('confVal').innerHTML =
    `${confidence}<span class="rc-unit">%</span>`;

  document.getElementById('tierVal').textContent = tier;

  // GAUGE
  const gaugePct = ((eta - 10) / (54 - 10)) * 100;

  setTimeout(() => {
    document.getElementById('gaugeFill').style.width =
      gaugePct + '%';
  }, 100);

  document.getElementById('confFill').style.width =
    confidence + '%';

  document.getElementById('confLabel').textContent =
    confidence + '%';

  // ETA WINDOW
  const now = new Date();

  const tLow = new Date(now.getTime() + low * 60000);
  const tHigh = new Date(now.getTime() + high * 60000);

  const fmt = d =>
    d.toLocaleTimeString([], {
      hour: '2-digit',
      minute: '2-digit'
    });

  document.getElementById('etaWindow').textContent =
    `${fmt(tLow)} – ${fmt(tHigh)}`;

  // RECOMMENDATIONS
  const recs = {
    Jam: 'Heavy congestion expected.',
    High: 'Traffic may slightly delay delivery.',
    Medium: 'Moderate traffic conditions.',
    Low: 'Traffic conditions are favorable.'
  };

  document.getElementById('rec').textContent =
    recs[inputs.traffic];

  // FACTORS
  const factors = [
    {
      name: 'Traffic',
      impact: 0.212,
      val: inputs.traffic,
      color: 'var(--orange)',
      grad: 'linear-gradient(90deg,#FF5722,#FF8A50)'
    },
    {
      name: 'Multi-Delivery',
      impact: 0.178,
      val: `×${inputs.multi}`,
      color: 'var(--pink)',
      grad: 'linear-gradient(90deg,#E91E8C,#F06292)'
    },
    {
      name: 'Weather',
      impact: 0.101,
      val: inputs.weather,
      color: 'var(--cyan)',
      grad: 'linear-gradient(90deg,#00BCD4,#4DD0E1)'
    },
    {
      name: 'Region',
      impact: 0.020,
      val: regionLabel,
      color: 'var(--purple2)',
      grad: 'linear-gradient(90deg,#7C4DFF,#B388FF)'
    }
  ];

  const maxImpact = factors[0].impact;

  document.getElementById('factorRows').innerHTML =
    factors.map(f => `
      <div class="factor-row">
        <div class="factor-name">${f.name}</div>

        <div class="factor-bar-wrap">
          <div class="factor-bar"
            style="
              width:${(f.impact/maxImpact*100)}%;
              background:${f.grad};
            ">
          </div>
        </div>

        <div class="factor-val"
          style="color:${f.color};">
          ${f.val}
        </div>
      </div>
    `).join('');

  // SUMMARY
  document.getElementById('summaryText').innerHTML = `
    Your order is predicted to arrive in
    <strong>${eta} minutes</strong>.

    Current traffic is
    <strong>${inputs.traffic}</strong> with
    <strong>${inputs.weather}</strong> weather conditions.

    Delivery region:
    <strong>${regionEmoji} ${regionLabel}</strong>.
  `;

  // TAGS
  document.getElementById('summaryTags').innerHTML = `
    <span class="s-tag"
      style="
        background:rgba(255,87,34,0.1);
        color:var(--orange);
        border:1px solid rgba(255,87,34,0.25);
      ">
      ${inputs.traffic} Traffic
    </span>

    <span class="s-tag"
      style="
        background:rgba(0,188,212,0.1);
        color:var(--cyan);
        border:1px solid rgba(0,188,212,0.25);
      ">
      ${inputs.weather}
    </span>

    <span class="s-tag"
      style="
        background:rgba(124,77,255,0.1);
        color:var(--purple2);
        border:1px solid rgba(124,77,255,0.25);
      ">
      ${regionEmoji} ${regionLabel}
    </span>
  `;

  // SHOW RESULTS
  const rs = document.getElementById('resultSection');

  rs.classList.add('visible');

  rs.scrollIntoView({
    behavior: 'smooth',
    block: 'start'
  });
}
</script>
